services:
  nodejs:
    build: .
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      whisper:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    volumes:
      - node_modules:/app/speech-server/node_modules
    ports:
      - "7001:7001"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=faster_whisper
      - ASR_QUANTIZATION=int8
      - OMP_NUM_THREADS=4
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2560M # Увеличен лимит для обработки больших файлов

